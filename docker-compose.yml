services:
  # for BullMQ queues and rate limiting
  redis:
    image: redis:7-alpine
    container_name: reqres-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - reqres-internal

  # for debugging
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: reqres-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - debug
    networks:
      - reqres-internal

  # standalone worker (for production-like setup, separate from API)
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: reqres-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_CONCURRENCY=5
      - RUNNER_BASE_URL=${RUNNER_BASE_URL:-http://host.docker.internal:5000}
      - RUNNER_SHARED_SECRET=${RUNNER_SHARED_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - reqres-internal

networks:
  reqres-internal:
    driver: bridge

volumes:
  redis_data:
    driver: local
